<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figure 1 — The agentic-serving ecosystem and the unoccupied measurement niche</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:#fff;color:#111;font-family:Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}

</head>
<body>
<figure class="wrap" style="margin:0">
<header>
  <span class="ftitle">Figure 1 &mdash; the agentic-serving ecosystem</span>
  <div id="chips"></div>
  <div class="tools">
    <button class="tb" id="zin" aria-label="Zoom in">+</button>
    <button class="tb" id="zout" aria-label="Zoom out">&minus;</button>
    <button class="tb" id="zfit" aria-label="Reset view">&#10530;</button>
  </div>
</header>
<p class="sr">Tiered dataflow diagram of the agentic LLM serving ecosystem, in the style of a systems-paper figure: titled group boxes for personas/pains, clients and orchestration, open serving engines, vendor hardware, a measurement band, and this work with its contributions. The orchestrator-to-engine seam, where realized cache reuse falls below available reuse under mixed-traffic interleaving, is drawn in red; this work and its outputs are drawn in blue. Drag to pan, scroll to zoom, hover for detail, click a node to focus.</p>
<div id="vp"><div id="world"><svg id="edges" width="1200" height="800">
<defs>
<marker id="ad" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 z" fill="#444"/></marker>
<marker id="ag" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 z" fill="#888"/></marker>
<marker id="ar" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 z" fill="#9b2226"/></marker>
<marker id="ab" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L6.5,3 L0,6 z" fill="#2c5f8a"/></marker>
</defs>
</svg></div><div id="tip" role="status"></div></div>
<figcaption><b>Figure 1.</b> The agentic-serving ecosystem as a left-to-right dataflow. Agent and chat clients submit through workflow-agnostic orchestrators to open serving engines; at the <span style="color:#9b2226">orchestrator&#8596;engine seam</span> (red) the engine is blind to the agent loop, so under mixed-traffic interleaving an agent's <i>realized</i> KV-cache reuse falls below its <i>available</i> reuse. A crowded field of mechanisms and vendor hints attacks this; existing benchmarks measure capability or energy, not cost-per-completed-task tied to cache behavior on open infrastructure. <span style="color:#2c5f8a"><b>This work</b></span> (blue) instruments that gap &mdash; locality gap = available &minus; realized &mdash; and ships the meter and the missing public trace.</figcaption>
<div class="key" id="key"></div>
</figure>
<script>
(function(){
  var bands=[
    {k:'personas',x0:-25,x1:170,l:'PERSONAS · PAINS'},
    {k:'clients',x0:180,x1:402,l:'CLIENTS · AGENTS · ORCHESTRATION'},
    {k:'engines',x0:412,x1:702,l:'OPEN SERVING ENGINES'},
    {k:'vendor',x0:712,x1:962,l:'VENDOR · HARDWARE'},
    {k:'contributions',x0:968,x1:1182,l:'THIS WORK · CONTRIBUTIONS'}
  ];
  var b2={persona:'personas',chat:'clients',app:'clients',orch:'clients',infra:'engines',engine:'engines',mech:'engines',vendor:'vendor',meas:'measurement',oppty:'contributions',project:'contributions'};
  var N=[
    {id:'U1',cat:'persona',x:70,y:135,t:'Platform / serving eng',s:'pain: can’t explain agents ≈5× chat',det:'Owns the GPUs; cache misses spike when chat and agents share an engine. Needs to attribute cost.'},
    {id:'U2',cat:'persona',x:70,y:280,t:'Agent product builder',s:'pain: $/token hides $/task',det:'Ships an agent product; long-horizon loops blow the budget while per-token price looks fine.'},
    {id:'U3',cat:'persona',x:70,y:445,t:'ML-systems researcher',s:'pain: no public agentic+cost trace',det:'Can’t compare engines/configs fairly without a shared mixed, cost-labeled workload.'},
    {id:'U4',cat:'persona',x:70,y:590,t:'Eng leadership / FinOps',s:'pain: unpredictable bills',det:'Needs a cost-per-successful-task meter to forecast and govern agent spend.'},
    {id:'CT',cat:'chat',x:300,y:120,t:'Chat / RAG traffic',s:'the co-tenant in mixed serving',det:'Short, bursty requests sharing the engine; their arrivals evict agent KV — the interleaving driver (H1).'},
    {id:'A1',cat:'app',x:300,y:250,t:'Coding agents',s:'Cursor · Claude Code · Codex · OpenHands',det:'Long tool-loops; context grows monotonically — the canonical high-reuse agent workload.'},
    {id:'A2',cat:'app',x:300,y:375,t:'Web / computer-use agents',s:'browser & GUI control loops',det:'Multi-step perception-action loops; similar reuse profile, different tool latencies.'},
    {id:'O',cat:'orch',x:300,y:500,t:'Orchestrators',s:'LangGraph · CrewAI · Agents SDK',det:'Drive the ReAct loop. Workflow-agnostic to the engine — the missing contract lives here.'},
    {id:'KV',cat:'infra',x:585,y:135,t:'KV infra',s:'Mooncake · LMCache · llm-d',det:'Distributed KV pools / offload that extend the cache beyond one GPU’s HBM.'},
    {id:'E1',cat:'engine',x:585,y:285,t:'vLLM',s:'PagedAttention + prefix caching',det:'Open engine #1. Exposes prefix_cache_hits/queries + per-request num_cached_tokens — our realized-reuse source.'},
    {id:'E2',cat:'engine',x:585,y:415,t:'SGLang',s:'RadixAttention reuse (ceiling)',det:'Open engine #2. Content-based prefix sharing — the best-case reuse ceiling to measure against.'},
    {id:'M',cat:'mech',x:585,y:560,t:'Agent-aware mechanisms',s:'KVFlow · Continuum · SAGA · ThunderAgent · Helium · Cortex · HexAGenT',det:'The crowded fix: everyone is building agent-aware caching/scheduling. That is why we measure rather than add one.'},
    {id:'V1',cat:'vendor',x:837,y:330,t:'NVIDIA Dynamo',s:'KV-aware router + agent hints',det:'The declared contract, shipping: nvext.agent_hints + cache_control TTL. Pre-empts “propose a hint spec”.'},
    {id:'B3',cat:'meas',x:255,y:715,t:'SWE-bench V · τ²-bench · HAL',s:'our task benchmarks; HAL cost-aware',det:'Define “verified task”. SWE-bench Verified + τ²-bench are the two pilot arms.'},
    {id:'C0',cat:'meas',x:470,y:715,t:'Cost-of-Pass (anchor)',s:'$ per correct solution',det:'The academic anchor: expected cost per correct answer. We open it to serving-internal cache behavior.'},
    {id:'B1',cat:'meas',x:680,y:715,t:'AA-AgentPerf',s:'agents/MW under SLO; closed set',det:'Industry agent-efficiency benchmark — agents-per-megawatt, closed test set, no cost-per-task.'},
    {id:'B2',cat:'meas',x:885,y:715,t:'InferenceX',s:'$/token, throughput; not agentic',det:'General serving benchmark; cost-per-token and throughput, not tied to agent task success.'},
    {id:'Z1',cat:'oppty',x:1075,y:165,t:'Cost-of-Grit meter (C1)',s:'the locality-tax curve',det:'Lead contribution: cost per completed task vs horizon × cache policy × tenancy — the missing meter.'},
    {id:'Z2',cat:'oppty',x:1075,y:315,t:'Public mixed trace (C3)',s:'cost-labeled · open-infra · none exists',det:'Artifact contribution: a mixed chat+agent, cost-labeled, OTel-format serving trace + harness.'},
    {id:'P',cat:'project',x:1068,y:465,t:'This work — the open meter',s:'cost-per-verified-task · gap = available − realized',det:'Holds the model fixed; varies serving knobs on open infra; measures the value lost at the seam.',big:1},
    {id:'Z3',cat:'oppty',x:1075,y:610,t:'Value-of-hints (C4)',s:'declared vs inferred — measured',det:'Re-scoped contribution: measure the marginal value of existing hints (Dynamo pre-empts proposing a new spec).'}
  ];
  var E=[
    ['CT','E1','interleave','interleaves → evicts agent KV'],['CT','E2','interleave'],
    ['A1','O','flow'],['A2','O','flow'],
    ['O','E1','seam','workflow-agnostic seam'],['O','E2','seam'],
    ['KV','E1','flow'],['KV','E2','flow'],
    ['M','E1','flow'],['M','E2','flow'],
    ['E1','V1','flow'],['E2','V1','flow'],
    ['U1','E1','pain'],['U2','A1','pain'],['U3','B3','pain'],['U4','V1','pain'],
    ['B1','V1','meas'],['B2','E1','meas'],['B3','A1','meas'],
    ['C0','P','anchor','anchored on Cost-of-Pass'],
    ['P','E1','project','measures available − realized'],['P','V1','project'],
    ['P','Z1','deliver'],['P','Z2','deliver'],['P','Z3','deliver'],
    ['Z3','V1','preempt','pre-empted by Dynamo']
  ];
  var ek={
    flow:{c:'#555',w:1.3,d:'',m:'ad',l:'request / data flow'},
    seam:{c:'#9b2226',w:2.4,d:'',m:'ar',cl:'red',l:'orchestrator↔engine seam (the problem)'},
    interleave:{c:'#9b2226',w:1.6,d:'6 4',m:'ar',cl:'red',l:'mixed-traffic interleaving'},
    meas:{c:'#9a9a9a',w:1.2,d:'2 4',m:'ag',l:'measures / feels (annotation)'},
    pain:{c:'#b0b0b0',w:1.1,d:'1 4',m:'',l:''},
    project:{c:'#2c5f8a',w:1.8,d:'',m:'ab',cl:'blue',l:'this work instruments / delivers'},
    deliver:{c:'#2c5f8a',w:1.6,d:'',m:'ab',cl:'blue'},
    anchor:{c:'#9a9a9a',w:1.3,d:'5 5',m:'ag',l:'anchors / pre-empts'},
    preempt:{c:'#9a9a9a',w:1.3,d:'5 5',m:''}
  };
  var byId={};N.forEach(function(n){byId[n.id]=n;});
  var world=document.getElementById('world'),svg=document.getElementById('edges'),vp=document.getElementById('vp'),tip=document.getElementById('tip');
  var NS='http://www.w3.org/2000/svg';
  var bandEls={};
  bands.forEach(function(bd){
    var r=document.createElementNS(NS,'rect');
    r.setAttribute('x',bd.x0);r.setAttribute('y',46);r.setAttribute('width',bd.x1-bd.x0);r.setAttribute('height',610);
    r.setAttribute('fill','#f6f6f6');r.setAttribute('stroke','#e4e4e4');r.setAttribute('stroke-width','1');r.setAttribute('rx','3');
    svg.appendChild(r);
    var t=document.createElementNS(NS,'text');t.setAttribute('x',bd.x0+12);t.setAttribute('y',66);t.setAttribute('class','blab');t.textContent=bd.l;svg.appendChild(t);
    bandEls[bd.k]={r:r,t:t};
  });
  var mline=document.createElementNS(NS,'line');mline.setAttribute('x1',180);mline.setAttribute('y1',672);mline.setAttribute('x2',985);mline.setAttribute('y2',672);mline.setAttribute('stroke','#d6d6d6');mline.setAttribute('stroke-width','1');svg.appendChild(mline);
  var mlab=document.createElementNS(NS,'text');mlab.setAttribute('x',180);mlab.setAttribute('y',666);mlab.setAttribute('class','blab');mlab.textContent='MEASUREMENT · BENCHMARKS';svg.appendChild(mlab);
  bandEls['measurement']={r:mline,t:mlab};
  var nodeEls={};
  N.forEach(function(n){
    var pos=document.createElement('div');pos.className='np';pos.style.left=n.x+'px';pos.style.top=n.y+'px';
    var el=document.createElement('div');el.className='node'+(n.big?' big':'');
    el.innerHTML='<div class="ttl">'+n.t+'</div><div class="sub">'+n.s+'</div>';
    el.tabIndex=0;el.setAttribute('role','button');el.setAttribute('aria-label',n.t);
    pos.appendChild(el);world.appendChild(pos);nodeEls[n.id]=el;n._pos=pos;
    el.addEventListener('mouseenter',function(){showTip(n);});
    el.addEventListener('mouseleave',function(){if(!sel)hideTip();});
    el.addEventListener('click',function(ev){ev.stopPropagation();select(sel===n.id?null:n.id);});
  });
  N.forEach(function(n){var el=nodeEls[n.id];n.hw=el.offsetWidth/2+3;n.hh=el.offsetHeight/2+3;});
  function bound(a,b){var dx=b.x-a.x,dy=b.y-a.y,adx=Math.abs(dx)||1e-6,ady=Math.abs(dy)||1e-6,t=Math.min(b.hw/adx,b.hh/ady);return[b.x-dx*t,b.y-dy*t];}
  var edgeEls=[];
  E.forEach(function(e){
    var a=byId[e[0]],b=byId[e[1]],s=ek[e[2]];
    var p1=bound(b,a),p2=bound(a,b);
    var ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',p1[0]);ln.setAttribute('y1',p1[1]);ln.setAttribute('x2',p2[0]);ln.setAttribute('y2',p2[1]);
    ln.setAttribute('stroke',s.c);ln.setAttribute('stroke-width',s.w);ln.setAttribute('stroke-opacity','0.9');ln.setAttribute('stroke-linecap','round');
    if(s.d)ln.setAttribute('stroke-dasharray',s.d);
    if(s.m)ln.setAttribute('marker-end','url(#'+s.m+')');
    ln._s=e[0];ln._t=e[1];ln._w=s.w;svg.appendChild(ln);edgeEls.push(ln);
    if(e[3]){var mx=(p1[0]+p2[0])/2,my=(p1[1]+p2[1])/2,t=document.createElementNS(NS,'text');t.setAttribute('x',mx);t.setAttribute('y',my-3);t.setAttribute('text-anchor','middle');t.setAttribute('class','elbl'+(s.cl?' '+s.cl:''));t.textContent=e[3];svg.appendChild(t);t._s=e[0];t._t=e[1];edgeEls.push(t);}
  });
  var st={x:0,y:0,s:.62},raf=0;

  function placeTipFor(n){var r=vp.getBoundingClientRect(),sxp=st.x+n.x*st.s,syp=st.y+n.y*st.s,tw=tip.offsetWidth||220,th=tip.offsetHeight||70,L=Math.max(8,Math.min(sxp-tw/2,r.width-tw-8)),T=syp-th-30;if(T<8)T=syp+30;tip.style.left=L+'px';tip.style.top=T+'px';}
  function hideTip(){tip.style.opacity='0';tip.style.transform='translateY(3px)';}
  var sel=null;

  function select(id){
    sel=id;
    if(!id){N.forEach(function(n){nodeEls[n.id].classList.remove('sel','dim');});edgeEls.forEach(function(l){l.classList.remove('dim');});hideTip();return;}
    var s=nb(id);
    N.forEach(function(n){var el=nodeEls[n.id];el.classList.toggle('sel',n.id===id);el.classList.toggle('dim',!s[n.id]);});

    showTip(byId[id]);
  }
  var drag=null;
  vp.addEventListener('pointerdown',function(e){if(e.target.closest('.node'))return;drag={x:e.clientX,y:e.clientY};vp.classList.add('grab');vp.setPointerCapture(e.pointerId);if(sel)select(null);});
  vp.addEventListener('pointermove',function(e){if(!drag)return;st.x+=e.clientX-drag.x;st.y+=e.clientY-drag.y;drag.x=e.clientX;drag.y=e.clientY;sched();});
  vp.addEventListener('pointerup',function(){drag=null;vp.classList.remove('grab');});
  vp.addEventListener('pointercancel',function(){drag=null;vp.classList.remove('grab');});
  vp.addEventListener('wheel',function(e){e.preventDefault();var r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,wx=(mx-st.x)/st.s,wy=(my-st.y)/st.s,ns=Math.max(.35,Math.min(2.6,st.s*(e.deltaY<0?1.12:0.89)));st.x=mx-wx*ns;st.y=my-wy*ns;st.s=ns;sched();},{passive:false});
  function zc(f){var r=vp.getBoundingClientRect(),mx=r.width/2,my=r.height/2,wx=(mx-st.x)/st.s,wy=(my-st.y)/st.s,ns=Math.max(.35,Math.min(2.6,st.s*f));st.x=mx-wx*ns;st.y=my-wy*ns;st.s=ns;sched();}
  document.getElementById('zin').onclick=function(){zc(1.2);};

    b.onclick=function(){hidden[k]=!hidden[k];b.classList.toggle('off',hidden[k]);
      N.forEach(function(n){if(b2[n.cat]===k)n._pos.style.display=hidden[k]?'none':'';});
      if(bandEls[k]){bandEls[k].r.style.display=hidden[k]?'none':'';bandEls[k].t.style.display=hidden[k]?'none':'';}
      edgeEls.forEach(function(l){l.style.display=(hidden[b2[byId[l._s].cat]]||hidden[b2[byId[l._t].cat]])?'none':'';});
    };

    var sp=document.createElement('span');sp.className='k';
    sp.innerHTML='<span class="ks" style="border-top:'+(kk[3]>2?2.5:1.6)+'px '+kk[2]+' '+kk[1]+'"></span>'+ek[kk[0]].l;

})();
</script>
</body>
